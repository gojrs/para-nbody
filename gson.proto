syntax = "proto3";

package gson.v1;

// The Bridge between Subatomic Research and Macroscopic Simulation.
service SmarterBeingBridge {
  // Ref-Up: Workers propose shifts. (The "SIP INVITE" phase)
  rpc ProposeStack(StackFrame) returns (ActionResult);

  // LG-Down: The LifeGuard audits and corrects. (The "Stateful Inspection" phase)
  rpc AuditStack(StackFrame) returns (AuditReport);
}

message StackFrame {
  int64 tick_id = 1;             // The Universe Clock (Prevents stale signaling)
  int32 layer_depth = 2;         // 0: Simplex, 1: Particle, 2: Macro
  SectorControl sector_info = 3; // The "Subnet" or Chunk context

  oneof payload {
    FoundationLayer simplex = 4;
    ParticleLayer particles = 5;
    MacroLayer voxels = 6;
  }
}

message SectorControl {
  int64 sector_id = 1;
  Vector3 coordinates = 2;
  bool is_hydrated = 3;         // GCC Active vs. Newtonian Static
  int32 priority = 4;           // Observer distance for QoS/Jitter management
}

// Layer 0: The "Physical" Energy Layer (Force Vectors)
message FoundationLayer {
  double current_escrow = 1;
  repeated Dot simplex_map = 2;
  double paving_resolution = 3;
}

message Dot {
  int64 dot_id = 1;
  double energy_value = 2;
  Vector3 coordinates = 3;
}

// Layer 1: The "Data Link" Particle Layer (Matter/Antimatter)
message ParticleLayer {
  repeated Worker active_workers = 1;
  double tick_delta = 2;        // Latency/Jitter between physics steps
}

message Worker {
  int64 id = 1;
  string recipe_id = 2;         // References the YAML "Obsidian" or "Electron" template
  Vector3 pos_start = 3;
  Vector3 pos_target = 4;
  double vitals = 5;
  int32 mass = 6;               // Tower Height: (>0 Matter, <0 Antimatter, 0 Force)
  int64 group_id = 7;           // UUID for "Block-level" EtherChannel grouping
}

// Layer 2+: The "Macro" Application Layer (Blocks/Structures)
message MacroLayer {
  repeated Voxel blocks = 1;
  SimMode global_mode = 2;
}

message Voxel {
  int64 block_id = 1;
  string texture_id = 2;        // The "Skin" for the Dart/Flutter UI
  string particle_recipe = 3;
  bool is_static = 4;           // If true, engine skips high-speed GCC math
}

// The "Firewall" Response
message AuditReport {
  int64 tick_id = 1;
  bool is_legal = 2;
  repeated int64 death_list = 3; // Particles to be liquidated into Escrow
  double energy_recovered = 4;
  repeated Correction corrections = 5;
}

message Correction {
  int64 worker_id = 1;
  Vector3 safe_position = 2;    // The "Snap" coordinate after a collision
}

enum SimMode {
  STATIC_NEWTONIAN = 0;
  ACTIVE_HYBRID = 1;
  DEEP_SIMPLEX = 2;
}

message Vector3 { double x = 1; double y = 2; double z = 3; }
message ActionResult { bool success = 1; string message = 2; }